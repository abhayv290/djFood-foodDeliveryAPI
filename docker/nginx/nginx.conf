upstream django {
    server web:8000;
}

server {
    listen 80;
    server_name api.foodrevolut.abhayvii.dev www.api.foodrevolut.abhayvii.dev;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name api.foodrevolut.abhayvii.dev www.api.foodrevolut.abhayvii.dev;

    ssl_certificate     /etc/letsencrypt/live/api.foodrevolut.abhayvii.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.foodrevolut.abhayvii.dev/privkey.pem;
    ssl_dhparam         /etc/ssl/certs/dhparam.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    location /ws/ {
        proxy_pass http://django;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        proxy_buffering off;
        proxy_redirect  off;
    }

    location / {
        proxy_pass http://django;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        client_max_body_size 10M;

        proxy_connect_timeout 60s;
        proxy_read_timeout    60s;

        proxy_redirect off;
    }

    location /health {
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}